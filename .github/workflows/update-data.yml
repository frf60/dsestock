name: Update DSE Data

on:
  schedule:
    - cron: '0 11 * * *' # প্রতিদিন বাংলাদেশ সময় বিকাল ৫টায় অটোমেটিক চলবে
  workflow_dispatch: # ম্যানুয়ালি রান করার অপশন

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance requests beautifulsoup4 lxml

      - name: Run analyzer
        run: python scripts/analyzer.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff-index --quiet HEAD || git commit -m "chore: auto-update data via yfinance"
          git push
